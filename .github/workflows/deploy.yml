name: Jekyll → EO
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.2' }
      - run: |
          bundle install
          bundle exec jekyll build   # 产出在 _site
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npx @edgeone/pages-cli deploy ./_site \
                -n "${{ github.event.repository.name }}" \
                -t ${{ secrets.EDGEONE_API_TOKEN }}
