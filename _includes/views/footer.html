<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div class="site-footer-inner">
      <div>
        {{ site.copyright }} {% if site.author %}@{{ site.author | escape }}{% endif %}
        <a href="{{ site.links.github }}" target="_blank" rel="nofollow noopener noreferrer">
          <i class="fa fa-github" style="font-size: 24px;margin:0 8px"></i>
        </a>
      </div>
      <button class="mdui-btn mdui-btn-raised mdui-ripple" mdui-dialog="{target: '#example-1'}">еҲҶдә«</button>
      <div class="mdui-dialog">
        <div class="mdui-dialog-title">еҲҶдә«</div>
        <div class="mdui-dialog-content">
          <div id="qrcode"></div>
        </div>
        <div class="mdui-dialog-actions">
          <button id="generateQRCode" class="mdui-btn mdui-btn-raised mdui-ripple">з”ҹжҲҗдәҢз»ҙз Ғ</button>
          <button id="copyButton" class="mdui-btn mdui-btn-raised mdui-ripple">еӨҚеҲ¶йЎөйқўзҪ‘еқҖ</button>
        </div>
      </div>
      
    <!-- еј•е…Ҙqrcode.jsеә“ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        document.getElementById('generateQRCode').addEventListener('click', function() {
            // иҺ·еҸ–еҪ“еүҚзҪ‘йЎөзҡ„URL
            const url = window.location.href;

            // жё…з©әд№ӢеүҚзҡ„дәҢз»ҙз Ғ
            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';

            // еҲӣе»әдәҢз»ҙз Ғ
            const qrcode = new QRCode(qrcodeContainer, {
                text: url,
                width: 128,
                height: 128,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        });
    </script>
      <script>
        document.addEventListener('DOMContentLoaded', () => {
    const copyButton = document.getElementById('copyButton');

    copyButton.addEventListener('click', () => {
        // иҺ·еҸ–еҪ“еүҚйЎөйқўзҡ„URL
        const url = window.location.href;

        // дҪҝз”Ёnavigator.clipboard.writeTextж–№жі•еӨҚеҲ¶еҲ°еүӘиҙҙжқҝ
        navigator.clipboard.writeText(url)
            .then(() => {
                // еӨҚеҲ¶жҲҗеҠҹеҗҺзҡ„ж“ҚдҪң
                alert('йЎөйқўзҪ‘еқҖе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ');
            })
            .catch(err => {
                // еӨҚеҲ¶еӨұиҙҘеҗҺзҡ„ж“ҚдҪң
                console.error('еӨҚеҲ¶еӨұиҙҘ:', err);
                alert('еӨҚеҲ¶еӨұиҙҘпјҢиҜ·жүӢеҠЁеӨҚеҲ¶зҪ‘еқҖгҖӮ');
            });
    });
});
      </script>
      <div>
        жң¬з«ҷжҖ»и®ҝй—®йҮҸ<span id="busuanzi_value_site_pv" style='display:none'></span>ж¬ЎпјҢ
        и®ҝе®ўж•°<span id="busuanzi_value_site_uv" style='display:none'></span>дәәж¬ЎпјҢ
        з»ҹи®Ўз”ұ<a href="//busuanzi.ibruce.info/" rel="nofollow noopener noreferrer" target="_blank">дёҚи’ңеӯҗ</a>й©ұеҠЁгҖӮ
      </div>
      <div>
        Powered by
        <a title="Jekyll is a simple, blog-aware, static site generator." href="http://jekyllrb.com/"
           rel="nofollow noopener noreferrer" target="_blank">
          Jekyll
        </a>
        &amp;
        <a title="Yat, yet another theme." href="https://github.com/jeffreytse/jekyll-theme-yat"
           rel="nofollow noopener noreferrer" target="_blank">
          Yat Theme
        </a>
        .
      </div>
      <div class="footer-col rss-subscribe">йҖҡиҝҮ<a href="{{ "/feed.xml" | relative_url }}">RSS</a>и®ўйҳ…жҲ‘</div>
    </div>
  </div>
